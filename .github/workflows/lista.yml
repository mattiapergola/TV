name: Aggiorna playlist TV

permissions:
  contents: write

on:
  schedule:
    - cron: "0 22 * * *"   # 00:00 Italia in estate (CEST) = 22:00 UTC
  workflow_dispatch:

concurrency:
  group: aggiorna-playlist-tv
  cancel-in-progress: false

jobs:
  run-lista:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dipendenze Python
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv playwright python-dateutil Pillow

      - name: Install Chromium per Playwright
        run: |
          python -m playwright install --with-deps chromium

      - name: Crea .env
        run: |
          cat > .env <<EOF
          CANALIDADDY=${{ secrets.CANALIDADDY }}
          EVENTIDLHDEN=${{ secrets.EVENTIDLHDEN }}
          LINKDADDY=${{ secrets.LINKDADDY }}
          NOMEREPO=${{ secrets.NOMEREPO }}
          NOMEGITHUB=${{ secrets.NOMEGITHUB }}
          EOF

      - name: Esegui lista.py
        run: |
          python scripts/lista.py

      - name: Commit e push file aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Aggiornamento automatico playlist e EPG"
          git push
